<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TwinCare - Classificateur de Veille</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    html, body { background: #F0F5FA; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    // Load the JSX component via fetch to avoid CORS issues with file://
    async function loadApp() {
      try {
        const resp = await fetch('ClassificateurVeille.jsx');
        const code = await resp.text();
        const transformed = Babel.transform(code, { presets: ['react'] }).code;
        new Function('React', 'ReactDOM', transformed + '\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(ClassificateurVeille));')(React, ReactDOM);
      } catch(e) {
        console.error(e);
        document.getElementById('root').innerHTML = '<p style="padding:2rem;color:red;">Erreur de chargement: ' + e.message + '</p>';
      }
    }
    loadApp();
  </script>
</body>
</html>
